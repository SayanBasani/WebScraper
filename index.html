<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>YouTube Downloader</title>
</head>
<body>
    <div class="bg-gray-500 w-screen h-screen grid place-items-center">

        <div class="space-y-4 bg-white p-6 rounded-xl shadow-lg w-full max-w-xl">

            <!-- INPUT BOX -->
            <input
                id="ytUrlInput"
                type="text"
                placeholder="Paste YouTube video URL here..."
                class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-400"
            />

            <!-- STATUS -->
            <div class="download_status_div bg-gray-100 p-2 rounded">
                <span class="download_status text-sm text-gray-700"></span>
            </div>

            <!-- VIDEO PREVIEW -->
            <div class="bg-black rounded-xl overflow-hidden">
                <video
                    id="videoPreview"
                    class="w-full aspect-video hidden"
                    controls
                    preload="metadata"
                ></video>
            </div>

            <!-- DOWNLOAD BUTTON -->
            <button
                onclick="start()"
                id="downloadBtn"
                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700"
            >
                Download
            </button>

        </div>

    </div>

    <script>
        const download_status = document.querySelector('.download_status');
        const video = document.getElementById("videoPreview");
        const downloadBtn = document.getElementById("downloadBtn");
        const ytInput = document.getElementById("ytUrlInput");

        async function fetchData(info) {
            try {
                const response = await fetch(
                    `http://127.0.0.1:8000${info.download_url}?file=${info.file_name}`
                );

                const total = info.file_size;
                const reader = response.body.getReader();
                let receivedLength = 0;
                let chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    receivedLength += value.length;

                    const percent = Math.floor((receivedLength / total) * 100);
                    download_status.innerText = `Downloaded ${percent}%`;
                }

                const blob = new Blob(chunks, { type: "video/mp4" });
                const url = URL.createObjectURL(blob);

                video.src = url;
                video.classList.remove("hidden");
                video.muted = true;
                video.load();
                video.play();

                download_status.innerText = "Video ready to play 🎬";

            } catch (error) {
                console.error(error);
                download_status.innerText = "Download failed ❌";
            }
        }

        async function start() {
            const ytUrl = ytInput.value.trim();

            if (!ytUrl) {
                alert("Please enter a YouTube URL");
                return;
            }

            download_status.innerText = "Starting download...";
            downloadBtn.disabled = true;



            const response = await fetch("http://127.0.0.1:8000/ai/info/", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: ytUrl,
                    quality: "360"
                })
            });

            const info = await response.json();
            console.log(info);

            if (info.error) {
                download_status.innerText = info.error;
                downloadBtn.disabled = false;
                return;
            }
            setTimeout(function(){
            fetchData(info);
            },2000);
        }
    </script>

</body>
</html>
